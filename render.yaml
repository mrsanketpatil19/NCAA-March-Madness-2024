services:
  - type: web
    name: ncaa-march-madness-predictor
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.18
      - key: PORT
        value: 10000
    autoDeploy: true
    region: oregon
    plan: free
    healthCheckPath: /
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1 